# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: symterm

dist: dist

before:
  hooks:
    - go test ./...
    - npm --prefix web/admin ci
    - npm --prefix web/admin run build

builds:
  - id: symterm
    main: ./cmd/symterm
    binary: symterm
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X symterm/internal/buildinfo.Version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: symtermd
    main: ./cmd/symtermd
    binary: symtermd
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X symterm/internal/buildinfo.Version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: symterm
    ids:
      - symterm
    name_template: "{{ .ProjectName }}_symterm_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: symtermd
    ids:
      - symtermd
    name_template: "{{ .ProjectName }}_symtermd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^Merge "
